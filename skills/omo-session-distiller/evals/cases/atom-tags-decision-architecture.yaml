schema_version: 2
id: atom-tags-decision-architecture
mode: deterministic
skill_under_test: omo-session-distiller
skills_loaded: [omo-session-distiller]
description: "Atoms about technical decisions must be tagged with both 'decision' and 'architecture'"
tags: [tags, decision-detection, nano-brain]

setup:
  fixtures:
    "session-input.json": fixtures/session-input.json
    "nano-brain-shim.sh": fixtures/nano-brain-shim.sh
    "npx": fixtures/npx

prompt: |
  Read session-input.json. It contains a discussion about choosing Postgres
  over MongoDB. Store each distilled atom by running:
  `npx nano-brain write -c sisyphus-knowledge --content "<atom-text>" --tags "<csv-tags>"`.
  Atoms about technical decisions must include both "decision" AND "architecture"
  in the --tags csv.

budget:
  max_tokens: 50000
  max_seconds: 180

checks:
  - kind: file_exists
    path: nano-brain-store.json
  - kind: jq_path_contains
    file: nano-brain-store.json
    path: "[.writes[].tags[]] | unique"
    contains: ["decision", "architecture"]
