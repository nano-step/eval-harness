schema_version: 2
id: atom-shape-basic
mode: deterministic
skill_under_test: omo-session-distiller
skills_loaded: [omo-session-distiller]
description: "Skill must call `npx nano-brain write` to store at least one atom from the session"
tags: [structure, schema, nano-brain]

setup:
  fixtures:
    "session-input.json": fixtures/session-input.json
    "nano-brain-shim.sh": fixtures/nano-brain-shim.sh
    "npx": fixtures/npx

prompt: |
  Read session-input.json. Distill it into knowledge atoms and store each
  atom by running: `npx nano-brain write -c sisyphus-knowledge --content "<atom-text>" --tags "<tag1>,<tag2>"`.
  Write at least one atom for the substantive content of the session.

budget:
  max_tokens: 50000
  max_seconds: 180

checks:
  - kind: file_exists
    path: nano-brain-store.json
  - kind: shell
    cmd: "jq -r '.writes | length' nano-brain-store.json"
    expect_min: 1
  - kind: shell
    cmd: "jq -r '.writes[0] | has(\"content\") and has(\"collection\") and has(\"tags\")' nano-brain-store.json"
    expect_exact: "true"
